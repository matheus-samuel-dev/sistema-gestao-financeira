spring:
  application:
    name: finance-management-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance_management}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: ${PORT:8080}

app:
  security:
    jwt-secret: ${JWT_SECRET:replace-this-secret-with-at-least-256-bits}
    jwt-expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5176,http://127.0.0.1:5176}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
